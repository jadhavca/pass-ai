<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact · pass-ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1b2d;
    --navy-mid: #1a2d45;
    --cream: #f7f3ec;
    --cream-dark: #ede7dc;
    --muted: #6b7a8d;
    --text: #1c2b3a;
    --border: rgba(15,27,45,0.1);
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--text);
    line-height: 1.7;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 64px;
    border-bottom: 1px solid rgba(15,27,45,0.06);
    position: sticky;
    top: 0;
    background: rgba(247,243,236,0.96);
    backdrop-filter: blur(16px);
  }

  .nav-logo {
    font-family: monospace;
    font-size: 1rem;
    font-weight: 600;
    color: rgba(15,27,45,0.8);
    text-decoration: none;
    transition: color 0.15s ease;
  }

  .nav-logo:hover { color: var(--navy); }

  .nav-back {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s ease;
    font-family: var(--sans);
  }

  .nav-back:hover { color: var(--navy); }

  .nav-back svg { width: 12px; height: 12px; }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 4rem 2rem;
    text-align: center;
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    font-weight: 500;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  p {
    margin: 1.5rem 0;
    color: var(--muted);
    line-height: 1.75;
  }

  a {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 0.8rem 1.5rem;
    background: var(--navy);
    color: var(--cream);
    text-decoration: none;
    border-radius: 6px;
    font-weight: 600;
    transition: all 0.2s ease;
  }

  a:hover {
    background: var(--navy-mid);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(15,27,45,0.15);
  }

  a:active {
    transform: translateY(0);
  }

  .footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
  }

  @media (max-width: 768px) {
    nav { padding: 0 1.25rem; }
    .container { padding: 3rem 1.25rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">pass-ai</a>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to home
  </a>
</nav>

<div class="container">
  <h1>Contact</h1>
  <p>If you have questions about pass-ai, partnerships, or early access, get in touch.</p>

  <a href="mailto:hello@pass-ai.co.uk">Email Us</a>

  <div class="footer">
    Response time: 1–2 business days
  </div>
</div>

</body>
</html>
